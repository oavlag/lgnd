<html lang="en">
<head>
<meta charset="UTF-8" />

<title>Senderista Packing List</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
  #packing-liquid,
  #packing-liquid * {
    box-sizing: border-box;
  }

  #packing-liquid {
    --bg: #020203;
    --glass: rgba(10, 10, 12, .78);
    --glass-border: rgba(255, 255, 255, .16);
    --text: #ffffff;
    --muted: rgba(255,255,255,.76);
    --soft: rgba(255,255,255,.58);
    --orange: #ff4a16;
    --orange-2: #ff9a4d;
    --cream: #ffe2bd;
    --green: #22c55e;
    --red: #ef4444;
    --shadow: 0 34px 100px rgba(0,0,0,.75);
    --blur: 26px;
    --radius: 28px;

    width: 100%;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  #packing-liquid a {
    color: var(--orange-2);
    font-weight: 800;
    text-decoration: none;
  }

  #packing-liquid .page {
    position: relative;
    min-height: 100vh;
    padding: 28px 18px;
    background:
      radial-gradient(circle at 12% 12%, rgba(255,74,22,.30), transparent 25%),
      radial-gradient(circle at 88% 18%, rgba(34,197,94,.14), transparent 25%),
      radial-gradient(circle at 50% 100%, rgba(255,74,22,.14), transparent 34%),
      linear-gradient(180deg, #020203 0%, #070707 45%, #020203 100%);
  }

  #packing-liquid .page::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
    background-size: 54px 54px;
    mask-image: linear-gradient(to bottom, rgba(0,0,0,.85), transparent 78%);
  }

  #packing-liquid .lang-switcher {
    position: absolute;
    top: 18px;
    right: 18px;
    z-index: 50;
    display: flex;
    gap: 6px;
    padding: 6px;
    border-radius: 999px;
    background: rgba(255,255,255,.07);
    border: 1px solid rgba(255,255,255,.14);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 10px 40px rgba(0,0,0,.35);
  }

  #packing-liquid .lang-btn {
    width: 34px;
    height: 34px;
    border: none;
    cursor: pointer;
    border-radius: 50%;
    font-size: 1rem;
    background: rgba(255,255,255,.08);
    transition: all .25s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(255,255,255,.10);
  }

  #packing-liquid .lang-btn:hover {
    transform: translateY(-1px) scale(1.04);
    background: rgba(255,255,255,.14);
  }

  #packing-liquid .lang-btn.active {
    background: linear-gradient(135deg, var(--orange-2), var(--orange));
    box-shadow: 0 0 20px rgba(255,74,22,.35);
  }

  #packing-liquid .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(18px);
    opacity: .8;
    pointer-events: none;
    animation: floatOrb 10s ease-in-out infinite alternate;
  }

  #packing-liquid .orb.one {
    width: 300px;
    height: 300px;
    left: -110px;
    top: 130px;
    background: rgba(255,74,22,.30);
  }

  #packing-liquid .orb.two {
    width: 240px;
    height: 240px;
    right: -90px;
    top: 420px;
    background: rgba(34,197,94,.14);
    animation-delay: 1.5s;
  }

  @keyframes floatOrb {
    from { transform: translate3d(0, 0, 0) scale(1); }
    to { transform: translate3d(24px, -34px, 0) scale(1.08); }
  }

  #packing-liquid .container {
    position: relative;
    z-index: 2;
    max-width: 980px;
    margin: 0 auto;
    display: grid;
    gap: 22px;
    padding: 56px 0 40px;
  }

  #packing-liquid .glass {
    position: relative;
    overflow: hidden;
    border-radius: var(--radius);
    background:
      linear-gradient(135deg, rgba(255,255,255,.105), rgba(255,255,255,.035)),
      var(--glass);
    border: 1px solid var(--glass-border);
    box-shadow: var(--shadow);
    backdrop-filter: blur(var(--blur)) saturate(160%);
    -webkit-backdrop-filter: blur(var(--blur)) saturate(160%);
  }

  #packing-liquid .glass::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    border-radius: inherit;
    background:
      linear-gradient(135deg, rgba(255,255,255,.22), transparent 25%),
      radial-gradient(circle at 20% 0%, rgba(255,255,255,.14), transparent 34%);
    opacity: .55;
  }

  #packing-liquid .hero {
    padding: clamp(36px, 6vw, 68px) 24px;
    text-align: center;
  }

  #packing-liquid .hero > *,
  #packing-liquid .card > * {
    position: relative;
    z-index: 2;
  }

  #packing-liquid .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 18px;
    padding: 9px 14px;
    border-radius: 999px;
    background: rgba(255,255,255,.09);
    border: 1px solid rgba(255,255,255,.20);
    color: var(--cream);
    font-size: .78rem;
    font-weight: 800;
    letter-spacing: .12em;
    text-transform: uppercase;
  }

  #packing-liquid .hero h1 {
    margin: 0;
    font-size: clamp(2.6rem, 8vw, 5.5rem);
    line-height: .96;
    letter-spacing: -.07em;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 30px rgba(255,74,22,.20), 0 12px 40px rgba(0,0,0,.72);
  }

  #packing-liquid .hero p {
    max-width: 680px;
    margin: 20px auto 0;
    color: var(--muted);
    font-size: clamp(1rem, 2.2vw, 1.25rem);
    line-height: 1.6;
    font-weight: 700;
  }

  #packing-liquid .card {
    padding: clamp(22px, 4vw, 34px);
  }

  #packing-liquid .card-head {
    display: flex;
    align-items: center;
    gap: 14px;
    padding-bottom: 18px;
    margin-bottom: 18px;
    border-bottom: 1px solid rgba(255,255,255,.13);
  }

  #packing-liquid .number {
    width: 46px;
    height: 46px;
    flex: 0 0 46px;
    border-radius: 16px;
    display: grid;
    place-items: center;
    color: #130604;
    font-weight: 900;
    background: linear-gradient(135deg, var(--cream), var(--orange));
    box-shadow: 0 14px 34px rgba(255,74,22,.35);
  }

  #packing-liquid h2 {
    margin: 0;
    font-size: clamp(1.25rem, 4vw, 1.85rem);
    letter-spacing: -.04em;
    font-weight: 900;
    color: #fff;
  }

  #packing-liquid ul {
    list-style: none;
    margin: 0;
    padding: 0;
    display: grid;
    gap: 12px;
  }

  #packing-liquid li {
    display: grid;
    grid-template-columns: 34px 1fr;
    gap: 12px;
    align-items: flex-start;
    padding: 14px 15px;
    border-radius: 18px;
    background: rgba(255,255,255,.055);
    border: 1px solid rgba(255,255,255,.13);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
    color: #fff;
    line-height: 1.55;
    font-weight: 650;
  }

  #packing-liquid li::before {
    content: "✓";
    width: 34px;
    height: 34px;
    display: grid;
    place-items: center;
    border-radius: 13px;
    background: rgba(255,74,22,.16);
    border: 1px solid rgba(255,74,22,.34);
    color: var(--orange-2);
    font-weight: 900;
  }

  #packing-liquid .warning {
    border-color: rgba(239,68,68,.34);
    background:
      linear-gradient(135deg, rgba(239,68,68,.18), rgba(255,255,255,.035)),
      rgba(16,8,8,.82);
  }

  #packing-liquid .warning .number {
    background: linear-gradient(135deg, #ffd0d0, var(--red));
    box-shadow: 0 14px 34px rgba(239,68,68,.35);
  }

  #packing-liquid .warning li::before {
    content: "!";
    background: rgba(239,68,68,.20);
    border-color: rgba(239,68,68,.42);
    color: #ffb4b4;
  }

  #packing-liquid .intro {
    color: var(--muted);
    font-weight: 750;
    margin: 0 0 16px;
    line-height: 1.6;
  }

  #packing-liquid .footer {
    text-align: center;
    color: var(--soft);
    font-weight: 800;
    letter-spacing: .12em;
    text-transform: uppercase;
    font-size: .72rem;
    padding: 18px 0 0;
  }

  @media (max-width: 680px) {
    #packing-liquid .page { padding: 14px; }

    #packing-liquid .lang-switcher {
      top: 12px;
      right: 12px;
      padding: 5px;
      gap: 5px;
    }

    #packing-liquid .lang-btn {
      width: 31px;
      height: 31px;
      font-size: .92rem;
    }

    #packing-liquid .container {
      padding-top: 52px;
    }

    #packing-liquid li {
      grid-template-columns: 30px 1fr;
    }

    #packing-liquid li::before {
      width: 30px;
      height: 30px;
    }
  }
</style>
</head>

  const htmlKeys = new Set(["s1_1","s5_1","s5_2","s5_3","s5_4","s6_1"]);

  function detectBrowserLang() {
    const lang = (navigator.language || navigator.userLanguage || "en").toLowerCase();
    if (lang.startsWith("pt")) return "pt";
    if (lang.startsWith("es")) return "es";
    return "en";
  }

  function setLanguage(lang) {
    const selected = i18n[lang] ? lang : "en";
    document.querySelectorAll("[data-i18n]").forEach(el => {
      const key = el.getAttribute("data-i18n");
      if (!i18n[selected][key]) return;
      if (htmlKeys.has(key)) {
        el.innerHTML = i18n[selected][key];
      } else {
        el.textContent = i18n[selected][key];
      }
    });

    document.querySelectorAll(".lang-btn").forEach(btn => {
      btn.classList.toggle("active", btn.getAttribute("data-lang") === selected);
    });

    document.documentElement.lang = selected === "pt" ? "pt-BR" : selected;
    localStorage.setItem("packingLang", selected);
  }

  document.querySelectorAll(".lang-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      setLanguage(btn.getAttribute("data-lang"));
    });
  });

  setLanguage(localStorage.getItem("packingLang") || detectBrowserLang());
})();
