<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Legendários TOP1536</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0f1115;
      color: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page {
      position: relative;
      width: 100%;
      max-width: 900px;
      padding: 2rem;
    }

    .glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: .15;
      z-index: 0;
    }

    .glow-1 {
      top: -100px;
      left: -100px;
      width: 400px;
      height: 400px;
      background: #d4af37;
    }

    .glow-2 {
      bottom: -80px;
      right: -80px;
      width: 350px;
      height: 350px;
      background: #4a5b82;
    }

    .card {
      position: relative;
      z-index: 2;
      background: rgba(30, 33, 40, .65);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,.08);
      border-top: 4px solid #d4af37;
      border-radius: 18px;
      padding: 3rem 2rem;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
      text-align: center;
    }

    .badge {
      display: inline-block;
      margin-bottom: 1.5rem;
      padding: .6rem 1.2rem;
      border-radius: 999px;
      background: rgba(212,175,55,.15);
      border: 1px solid rgba(212,175,55,.4);
      color: #d4af37;
      font-family: 'Montserrat', sans-serif;
      font-size: .85rem;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(2.2rem,5vw,3.2rem);
      margin-bottom: 2rem;
      text-transform: uppercase;
      background: linear-gradient(to right, #d4af37, #ffffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .link-group {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      margin-top: 2rem;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .7rem;
      padding: 1rem;
      border-radius: 14px;
      text-decoration: none;
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      letter-spacing: .6px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #d4af37, #b8912b);
      color: #111;
      transition: .3s;
      box-shadow: 0 4px 15px rgba(212,175,55,.4);
      min-height: 58px;
    }

    .btn:hover {
      transform: translateY(-3px);
      background: linear-gradient(135deg, #e5c158, #d4af37);
      box-shadow: 0 8px 25px rgba(212,175,55,.6);
    }

    .btn:active {
      transform: scale(.97);
    }

    @media (max-width: 600px) {
      .card {
        padding: 2.5rem 1.5rem;
      }
    }
  </style>
</head>

<body>
  <div class="page">

    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <div class="card">
      <div class="badge">Legendários</div>

      <h1>TOP 1536</h1>

      <div class="link-group">

        <a href="https://www.subir.top/list-sen-en.html" target="_blank" class="btn">
          <i class="fa-solid fa-list-check"></i>
          Supply List
        </a>

        <a href="https://chat.whatsapp.com/CsfIUCuBnZr4PP3rT2s8F4?mode=gi_t" target="_blank" class="btn">
          <i class="fa-brands fa-whatsapp"></i>
          Whatsapp Group
        </a>

        <a href="https://app.zapsign.com.br/verificar/doc/1cbe0ded-72cb-4876-965f-43d6cdcb3297" target="_blank" class="btn">
          <i class="fa-solid fa-file-signature"></i>
          Waiver to Sign
        </a>

      </div>
    </div>
  </div>
</body>
</html>
